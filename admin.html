<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin · Las Violetas</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    :root {
      --violet: #7C3AED; --violet-dark: #5B21B6; --violet-light: #A78BFA;
      --violet-soft: #EDE9FE; --white: #fff;
      --gray-50: #F9FAFB; --gray-100: #F3F4F6; --gray-200: #E5E7EB;
      --gray-400: #9CA3AF; --gray-600: #4B5563; --gray-800: #1F2937;
      --green: #10B981; --green-soft: #D1FAE5;
      --orange: #F59E0B; --orange-soft: #FEF3C7;
      --red: #EF4444; --red-soft: #FEE2E2;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--gray-50); color: var(--gray-800); min-height: 100vh; }
    a { text-decoration: none; }
    .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--violet-soft) 0%, #fff 60%); }
    .login-card { background: white; border-radius: 20px; padding: 48px 40px; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(124,58,237,0.15); text-align: center; }
    .login-logo { font-size: 36px; color: var(--violet); margin-bottom: 8px; }
    .login-card h1 { font-size: 24px; font-weight: 700; color: var(--gray-800); margin-bottom: 4px; }
    .login-card p { color: var(--gray-400); font-size: 14px; margin-bottom: 32px; }
    .login-card input { width: 100%; padding: 14px 16px; border: 1.5px solid var(--gray-200); border-radius: 10px; font-size: 15px; font-family: inherit; background: var(--gray-50); outline: none; transition: all 0.2s; margin-bottom: 16px; text-align: center; letter-spacing: 2px; }
    .login-card input:focus { border-color: var(--violet); background: white; box-shadow: 0 0 0 3px rgba(124,58,237,0.08); }
    .login-btn { width: 100%; padding: 14px; background: var(--violet); color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.3s; font-family: inherit; }
    .login-btn:hover { background: var(--violet-dark); transform: translateY(-1px); }
    .login-error { color: var(--red); font-size: 13px; margin-top: 12px; display: none; }
    .login-error.show { display: block; }
    #dashboard { display: none; }
    .topbar { background: white; border-bottom: 1px solid var(--gray-200); padding: 0 32px; height: 64px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100; }
    .topbar-logo { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 700; color: var(--violet); }
    .topbar-logo span { font-size: 16px; color: var(--violet-light); }
    .topbar-title { color: var(--gray-400); font-size: 14px; margin-left: 4px; }
    .topbar-right { margin-left: auto; }
    .logout-btn { display: flex; align-items: center; gap: 8px; padding: 8px 16px; border: 1.5px solid var(--gray-200); border-radius: 8px; font-size: 13px; font-weight: 500; color: var(--gray-600); cursor: pointer; background: none; font-family: inherit; transition: all 0.2s; }
    .logout-btn:hover { border-color: var(--red); color: var(--red); }
    .main { padding: 32px; max-width: 1400px; margin: 0 auto; }
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 32px; }
    .stat-card { background: white; border-radius: 14px; padding: 24px; border: 1px solid var(--gray-200); display: flex; align-items: center; gap: 16px; }
    .stat-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .stat-icon.total { background: var(--violet-soft); color: var(--violet); }
    .stat-icon.pendiente { background: var(--orange-soft); color: var(--orange); }
    .stat-icon.confirmada { background: var(--green-soft); color: var(--green); }
    .stat-icon.cancelada { background: var(--red-soft); color: var(--red); }
    .stat-info strong { font-size: 28px; font-weight: 700; color: var(--gray-800); display: block; }
    .stat-info span { font-size: 13px; color: var(--gray-400); }
    .filters { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; align-items: center; }
    .filter-btn { padding: 8px 20px; border-radius: 100px; font-size: 13px; font-weight: 500; border: 1.5px solid var(--gray-200); background: white; color: var(--gray-600); cursor: pointer; transition: all 0.2s; font-family: inherit; }
    .filter-btn.active { background: var(--violet); border-color: var(--violet); color: white; }
    .filter-btn:hover:not(.active) { border-color: var(--violet-light); color: var(--violet); }
    .search-box { margin-left: auto; display: flex; align-items: center; gap: 8px; background: white; border: 1.5px solid var(--gray-200); border-radius: 8px; padding: 8px 14px; }
    .search-box i { color: var(--gray-400); font-size: 13px; }
    .search-box input { border: none; outline: none; font-size: 13px; font-family: inherit; color: var(--gray-800); background: transparent; width: 200px; }
    .table-wrap { background: white; border-radius: 14px; border: 1px solid var(--gray-200); overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    thead th { padding: 14px 16px; text-align: left; font-size: 11px; font-weight: 600; color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.8px; background: var(--gray-50); border-bottom: 1px solid var(--gray-200); }
    tbody tr { border-bottom: 1px solid var(--gray-100); transition: background 0.15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--gray-50); }
    tbody td { padding: 14px 16px; font-size: 14px; color: var(--gray-800); }
    td.muted { color: var(--gray-400); font-size: 13px; }
    td.name { font-weight: 600; }
    .badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 100px; font-size: 12px; font-weight: 600; }
    .badge.pendiente { background: var(--orange-soft); color: var(--orange); }
    .badge.confirmada { background: var(--green-soft); color: var(--green); }
    .badge.cancelada { background: var(--red-soft); color: var(--red); }
    .actions { display: flex; gap: 6px; }
    .action-btn { padding: 5px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1.5px solid; transition: all 0.2s; font-family: inherit; }
    .action-btn.confirm { border-color: var(--green); color: var(--green); background: white; }
    .action-btn.confirm:hover { background: var(--green); color: white; }
    .action-btn.cancel { border-color: var(--red); color: var(--red); background: white; }
    .action-btn.cancel:hover { background: var(--red); color: white; }
    .action-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .empty { text-align: center; padding: 64px 24px; color: var(--gray-400); }
    .empty i { font-size: 40px; margin-bottom: 12px; display: block; color: var(--violet-light); }
    .empty p { font-size: 15px; }
    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--gray-800); color: white; padding: 14px 20px; border-radius: 10px; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.2); transform: translateY(80px); opacity: 0; transition: all 0.3s; z-index: 999; }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success i { color: var(--green); }
    .toast.error i { color: var(--red); }
    .loading { text-align: center; padding: 64px; color: var(--gray-400); }
    .loading i { font-size: 28px; color: var(--violet-light); margin-bottom: 12px; display: block; }
    @media (max-width: 1024px) { .stats { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 768px) { .main { padding: 20px 16px; } .stats { grid-template-columns: 1fr 1fr; } .topbar { padding: 0 16px; } .search-box { display: none; } .table-wrap { overflow-x: auto; } table { min-width: 700px; } }
    @media (max-width: 480px) { .stats { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="login-wrap" id="loginScreen">
    <div class="login-card">
      <div class="login-logo"><i class="fa-solid fa-tooth"></i></div>
      <h1>Las Violetas</h1>
      <p>Panel de Administración</p>
      <input type="password" id="passwordInput" placeholder="Contraseña" onkeydown="if(event.key==='Enter') login()" />
      <button class="login-btn" onclick="login()"><i class="fa-solid fa-lock-open"></i> Ingresar</button>
      <p class="login-error" id="loginError">Contraseña incorrecta</p>
    </div>
  </div>
  <div id="dashboard">
    <div class="topbar">
      <div class="topbar-logo"><span>✦</span> Las Violetas <span class="topbar-title">/ Admin</span></div>
      <div class="topbar-right">
        <button class="logout-btn" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Salir</button>
      </div>
    </div>
    <div class="main">
      <div class="stats">
        <div class="stat-card"><div class="stat-icon total"><i class="fa-solid fa-calendar-days"></i></div><div class="stat-info"><strong id="statTotal">—</strong><span>Total reservas</span></div></div>
        <div class="stat-card"><div class="stat-icon pendiente"><i class="fa-solid fa-clock"></i></div><div class="stat-info"><strong id="statPendiente">—</strong><span>Pendientes</span></div></div>
        <div class="stat-card"><div class="stat-icon confirmada"><i class="fa-solid fa-circle-check"></i></div><div class="stat-info"><strong id="statConfirmada">—</strong><span>Confirmadas</span></div></div>
        <div class="stat-card"><div class="stat-icon cancelada"><i class="fa-solid fa-circle-xmark"></i></div><div class="stat-info"><strong id="statCancelada">—</strong><span>Canceladas</span></div></div>
      </div>
      <div class="filters">
        <button class="filter-btn active" onclick="setFiltro('todas', this)">Todas</button>
        <button class="filter-btn" onclick="setFiltro('pendiente', this)">Pendientes</button>
        <button class="filter-btn" onclick="setFiltro('confirmada', this)">Confirmadas</button>
        <button class="filter-btn" onclick="setFiltro('cancelada', this)">Canceladas</button>
        <div class="search-box"><i class="fa-solid fa-magnifying-glass"></i><input type="text" id="searchInput" placeholder="Buscar paciente..." oninput="renderTabla()" /></div>
      </div>
      <div class="table-wrap" id="tableWrap"><div class="loading"><i class="fa-solid fa-spinner fa-spin"></i><p>Cargando reservas...</p></div></div>
    </div>
  </div>
  <div class="toast" id="toast"><i class="fa-solid fa-circle-check"></i><span id="toastMsg"></span></div>
  <script src="admin.js"></script>
</body>
</html>
